name: CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # _license-secret.ts is generated (gitignored) — required by
      # license-activation.ts before tsc/vitest can run.
      - name: Inject license secret
        env:
          MINGLY_LICENSE_SECRET: ${{ secrets.MINGLY_LICENSE_SECRET }}
        run: npx tsx scripts/inject-secret.ts

      - name: Type check (main process)
        run: npx tsc -p tsconfig.main.json --noEmit

      - name: Type check (renderer)
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [24]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Inject license secret
        env:
          MINGLY_LICENSE_SECRET: ${{ secrets.MINGLY_LICENSE_SECRET }}
        run: npx tsx scripts/inject-secret.ts

      - name: Run tests with coverage
        run: npx vitest run --coverage

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint --if-present

  build:
    name: Build (${{ matrix.os }})
    needs: [typecheck, test]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # prebuild:main runs inject-secret automatically (npm lifecycle hook)
      - name: Build main process
        env:
          MINGLY_LICENSE_SECRET: ${{ secrets.MINGLY_LICENSE_SECRET }}
        run: npm run build:main

      - name: Build renderer
        run: npm run build:renderer

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --production --audit-level=high
        continue-on-error: true

      - name: Check for sensitive data patterns
        run: |
          if grep -rn "sk-ant-\|sk-[a-zA-Z0-9]\{20,\}\|AIza[a-zA-Z0-9]\{30,\}" src/ --include="*.ts" --include="*.tsx" \
            --exclude="*sensitive-data-detector*" \
            --exclude="*SettingsModal*" \
            --exclude="*SettingsPage*" \
            --exclude="*SetupWizard*" \
            --exclude-dir="__tests__" \
            | grep -v 'placeholder' | grep -v 'pattern:'; then
            echo "::error::Potential API key found in source code!"
            exit 1
          fi
          echo "No sensitive data patterns found."

  docker-rag:
    name: Docker RAG Stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build RAG server image
        run: docker build -t mingly-rag-server ./rag-server

      - name: Validate docker-compose
        run: docker compose config --quiet

  release:
    name: Release (${{ matrix.os }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, security]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      # prebuild:main runs inject-secret automatically (npm lifecycle hook)
      - name: Build
        env:
          MINGLY_LICENSE_SECRET: ${{ secrets.MINGLY_LICENSE_SECRET }}
        run: npm run build

      # ── macOS signing & notarization setup ──────────────────────────
      # Writes the App Store Connect API key to disk and exports signing/
      # notarization env vars via GITHUB_ENV (macOS only). electron-builder
      # signs, notarizes and staples automatically when these are present.
      # CSC vars must NOT be set on Linux/Windows jobs — an empty or
      # wrong-type cert crashes electron-builder there.
      - name: Setup macOS signing & notarization
        if: runner.os == 'macOS'
        env:
          APPLE_API_KEY_P8_B64: ${{ secrets.APPLE_API_KEY_P8_B64 }}
        run: |
          printf '%s' "$APPLE_API_KEY_P8_B64" | base64 -d > "$RUNNER_TEMP/AuthKey.p8"
          {
            echo "CSC_LINK=${{ secrets.CSC_LINK }}"
            echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}"
            echo "APPLE_API_KEY=$RUNNER_TEMP/AuthKey.p8"
            echo "APPLE_API_KEY_ID=${{ secrets.APPLE_API_KEY_ID }}"
            echo "APPLE_API_ISSUER=${{ secrets.APPLE_API_ISSUER }}"
          } >> "$GITHUB_ENV"

      - name: Package and publish Electron app
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Keychain auto-discovery off; explicit CSC_LINK (macOS, from the
          # setup step above) still applies. Windows/Linux stay unsigned.
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Generate checksums (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd release
          for f in *.dmg *.zip *.AppImage *.deb; do
            [ -f "$f" ] && shasum -a 256 "$f" >> checksums-sha256.txt
          done
        continue-on-error: true

      - name: Generate checksums (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd release
          Get-ChildItem -Filter *.exe | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$hash  $($_.Name)" | Out-File -Append checksums-sha256.txt
          }
        continue-on-error: true

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/checksums-sha256.txt
          retention-days: 30
