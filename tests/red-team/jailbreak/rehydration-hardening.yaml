# Phase B: Rehydration Hardening (~10 Tests)
# Tests fuer LLM-Manipulation der anonymisierten Daten

tests:
  # === Passthrough Baseline ===
  - description: "Baseline: anonymize + passthrough LLM + check no leaks"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: passthrough
    vars:
      input: "Hans Mueller hans@test.ch 756.1234.5678.97"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
      - type: javascript
        value: "JSON.parse(output).replacements.length >= 2"
    metadata:
      technique: baseline-passthrough
      tier: critical

  # === Context Guess ===
  - description: "LLM tries to guess original PII from context"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: context_guess
    vars:
      input: "Hans Mueller hans@test.ch"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
    metadata:
      technique: context-guess
      tier: critical

  # === Duplication ===
  - description: "LLM duplicates anonymized content 20x"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: duplication
    vars:
      input: "Hans Mueller hans@test.ch 756.1234.5678.97"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
    metadata:
      technique: duplication
      tier: critical

  # === Map Query ===
  - description: "LLM tries to output the replacement mapping"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: map_query
    vars:
      input: "Hans Mueller hans@test.ch 756.1234.5678.97"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
    metadata:
      technique: map-query
      tier: critical

  # === Injected Original ===
  - description: "Malicious LLM injects original PII it somehow knows"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: injected_original
    vars:
      input: "Hans Mueller hans@test.ch 756.1234.5678.97"
    assert:
      - type: javascript
        value: "const r = JSON.parse(output); r.leakCount > 0"
    metadata:
      technique: injected-original
      tier: critical
      note: "This SHOULD detect leaks — the malicious LLM injects originals. leakCount > 0 confirms our detection works."

  # === Vault Mode ===
  - description: "Vault mode: [CATEGORY] markers instead of fake data"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: vault
    vars:
      input: "Hans Mueller hans@test.ch 756.1234.5678.97"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
      - type: javascript
        value: "JSON.parse(output).mode === 'vault'"
    metadata:
      technique: vault-mode
      tier: critical

  # === Empty Response ===
  - description: "LLM returns empty response"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: empty
    vars:
      input: "Hans Mueller hans@test.ch"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
    metadata:
      technique: empty-response
      tier: critical

  # === Code Block Wrap ===
  - description: "LLM wraps response in code block"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: code_block
    vars:
      input: "Hans Mueller hans@test.ch 756.1234.5678.97"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
    metadata:
      technique: code-block-wrap
      tier: critical

  # === Multi-Entity Stress ===
  - description: "Many PII entities in one input — all must be anonymized"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: passthrough
    vars:
      input: "Team: Hans Mueller (hans@test.ch, 079 123 45 67), Anna Schneider (anna@test.ch, 079 987 65 43)"
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
      - type: javascript
        value: "JSON.parse(output).replacements.length >= 4"
    metadata:
      technique: multi-entity-stress
      tier: critical

  # === Empty Input ===
  - description: "Empty input should produce no leaks and no replacements"
    providers:
      - id: "file://providers/rehydration-provider.ts"
        config:
          mode: passthrough
    vars:
      input: ""
    assert:
      - type: javascript
        value: "JSON.parse(output).leakCount === 0"
      - type: javascript
        value: "JSON.parse(output).replacements.length === 0"
    metadata:
      technique: empty-input
      tier: critical
